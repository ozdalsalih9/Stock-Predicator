name: probora

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: probora
      POSTGRES_USER: probora
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env.vps}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U probora -d probora"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [private]
    logging: *default-logging

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Probora: Host=postgres;Port=5432;Database=probora;Username=probora;Password=${POSTGRES_PASSWORD}
      OTEL_SDK_DISABLED: "true"
    networks: [private]
    logging: *default-logging

  worker:
    build:
      context: .
      dockerfile: infra/docker/worker.Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DOTNET_ENVIRONMENT: Production
      ConnectionStrings__Probora: Host=postgres;Port=5432;Database=probora;Username=probora;Password=${POSTGRES_PASSWORD}
      Models__Root: /app/artifacts/models
      TwelveData__Enabled: ${TWELVE_DATA_ENABLED:-true}
      TwelveData__ApiKey: ${TWELVE_DATA_API_KEY:?TWELVE_DATA_API_KEY must be set in .env.vps}
      Gdelt__Enabled: ${GDELT_ENABLED:-false}
      OTEL_SDK_DISABLED: "true"
    volumes:
      - ./artifacts/models:/app/artifacts/models:ro
    networks: [private]
    logging: *default-logging

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    restart: unless-stopped
    networks: [private]
    logging: *default-logging

  gateway:
    image: caddy:2.10-alpine
    restart: unless-stopped
    depends_on: [api, web]
    ports:
      - "127.0.0.1:${PROBORA_SSH_PORT:-8090}:80"
    volumes:
      - ./infra/caddy/Caddyfile.vps:/etc/caddy/Caddyfile:ro
    networks: [private]
    logging: *default-logging

networks:
  private:

volumes:
  postgres-data:

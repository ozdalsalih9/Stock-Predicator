name: ci

on:
  push:
    branches: [main, "codex/**"]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
      - run: dotnet restore Probora.slnx
      - run: dotnet build Probora.slnx -c Release --no-restore
      - run: dotnet test Probora.slnx -c Release --no-build --collect:"XPlat Code Coverage"
      - run: dotnet list Probora.slnx package --vulnerable --include-transitive

  model-pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ml/pyproject.toml
      - run: pip install -e "./ml[dev]" pip-audit
      - run: ruff check ml
      - run: pytest ml --cov=probora_ml --cov-report=term-missing
      - run: pip-audit

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/probora-web
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/probora-web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - run: npm audit --audit-level=high

  containers:
    runs-on: ubuntu-latest
    needs: [backend, model-pipeline, web]
    steps:
      - uses: actions/checkout@v5
      - run: docker compose config --quiet
      - run: docker compose build api worker web
